name: Build check

# Fast, deterministic guard: builds the site and validates the output on every
# pull request and push to main, so a broken source chunk can't slip through.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
