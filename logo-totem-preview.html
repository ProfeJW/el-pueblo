<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><style>html,body{margin:0;background:#0a0c18;}</style></head>
<body>
<svg id="canvas" width="1100" height="900" viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ============ right-half elements (mirrored) ============ -->
    <g id="sideR" fill="none" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <!-- crown side panel -->
      <path d="M158 44 L176 62 M176 44 L158 62 M158 66 L176 84 M176 66 L158 84"/>
      <path d="M178 54 H190 V98"/>
      <!-- volute curls under headband -->
      <path d="M150 118 q16 0 16 13 q0 9 -9 9 q-6 0 -6 -6"/>
      <path d="M172 118 q15 0 15 13 q0 9 -9 9 q-6 0 -6 -6"/>
      <!-- SERPENT head — larger, defined beak -->
      <path d="M164 146 q26 -9 42 6 q10 10 4 22 q-5 10 -17 12 q5 8 -3 13 q-10 6 -22 -2 q-15 -9 -18 -25 q-2 -11 5 -18 q5 -6 9 -8 Z"/>
      <circle cx="186" cy="160" r="5.5"/><circle cx="186" cy="160" r="2.6" fill="currentColor" stroke="none"/>
      <path d="M150 170 q-9 1 -13 8"/>
      <path d="M158 182 q-7 2 -11 7"/>
      <!-- SERPENT banded coil -->
      <path d="M205 176 q27 16 24 49 q-2 31 -31 41 q-20 7 -34 -6"/>
      <path d="M198 186 q17 11 16 38 q-1 23 -23 31 q-12 4 -22 -4"/>
      <path d="M217 192 L207 197 M225 216 L212 217 M219 242 L206 238 M199 258 L193 247 M177 260 L176 247"/>
      <path d="M191 242 a9 9 0 1 1 -3 -7"/>
      <!-- connector: coil tail flows into the temple -->
      <path d="M179 262 q16 9 13 28"/>
      <!-- feather plumes (graduated, with veins) -->
      <path d="M141 290 q5 -23 0 -42 q-5 23 0 42 Z"/><path d="M141 288 V250"/>
      <path d="M153 288 q5 -20 0 -36 q-5 20 0 36 Z"/><path d="M153 286 V254"/>
      <path d="M165 285 q4 -17 0 -30 q-4 17 0 30 Z"/><path d="M165 283 V258"/>
      <!-- cheek scroll -->
      <path d="M104 336 q-14 6 -12 22 q2 11 15 10"/>
      <!-- ear ornament + teardrop pendant -->
      <circle cx="60" cy="336" r="15"/><circle cx="60" cy="336" r="6"/>
      <path d="M60 351 q-6 7 0 14 q6 -7 0 -14 Z"/>
    </g>

    <!-- ============ central elements ============ -->
    <g id="mid" fill="none" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <!-- feather tufts -->
      <path d="M120 22 V10 M130 20 V6 M140 22 V10"/>
      <!-- stepped crown -->
      <path d="M68 100 V52 L82 52 L82 36 L104 36 L104 22 L156 22 L156 36 L178 36 L178 52 L192 52 V100"/>
      <path d="M104 36 V92 M121 36 V92 M138 36 V92 M156 36 V92"/>
      <path d="M104 36 H156 M104 55 H156 M104 74 H156 M104 92 H156"/>
      <path d="M108 52 L112.5 42 L117 52 M125 52 L129.5 42 L134 52 M142 52 L146.5 42 L151 52"/>
      <path d="M112.5 56 L117 65 L112.5 71 L108 65 Z M129.5 56 L134 65 L129.5 71 L125 65 Z M146.5 56 L151 65 L146.5 71 L142 65 Z"/>
      <path d="M108 90 L112.5 80 L117 90 M125 90 L129.5 80 L134 90 M142 90 L146.5 80 L151 90"/>
      <!-- headband -->
      <path d="M64 100 H196 M64 116 H196 M64 100 V116 M196 100 V116"/>
      <path d="M78 108 h8 M98 108 h8 M118 108 h8 M138 108 h8 M158 108 h8 M178 108 h8"/>
      <!-- spine + top diamond -->
      <path d="M125 116 V150 M135 116 V150"/>
      <path d="M130 150 L140 163 L130 176 L120 163 Z"/>
      <path d="M130 176 V190"/>
      <!-- SUN MEDALLION filling the coil center -->
      <circle cx="130" cy="214" r="20"/><circle cx="130" cy="214" r="8"/>
      <path d="M130 188 v-0 M130 240 v6 M104 214 h-2 M156 214 h2"/>
      <path d="M130 192 v6 M130 230 v6 M108 214 h6 M146 214 h6 M113 197 l4 4 M147 197 l-4 4 M113 231 l4 -4 M147 231 l-4 -4"/>
      <!-- spine continues to nose -->
      <path d="M130 246 V262"/>
      <!-- center feather plume -->
      <path d="M130 290 q6 -27 0 -50 q-6 27 0 50 Z"/><path d="M130 288 V242"/>
      <!-- mask / face frame -->
      <path d="M72 284 q-12 52 8 92 q16 30 50 34 q34 -4 50 -34 q20 -40 8 -92"/>
      <!-- forehead jewel -->
      <path d="M130 292 L138 301 L130 310 L122 301 Z"/>
      <!-- brow -->
      <path d="M88 322 q16 -8 30 -3 M142 319 q16 -5 30 3"/>
      <!-- eyes -->
      <path d="M90 334 q16 -11 32 0 q-16 11 -32 0 Z"/>
      <path d="M138 334 q16 -11 32 0 q-16 11 -32 0 Z"/>
      <circle cx="106" cy="333" r="4.4" fill="currentColor" stroke="none"/><circle cx="154" cy="333" r="4.4" fill="currentColor" stroke="none"/>
      <!-- nose (shorter) -->
      <path d="M124 310 V348 q-7 6 0 11 q7 4 13 0 q7 -5 0 -11 V310"/>
      <circle cx="123" cy="353" r="2" fill="currentColor" stroke="none"/><circle cx="137" cy="353" r="2" fill="currentColor" stroke="none"/>
      <!-- mouth (bigger) + teeth -->
      <path d="M92 366 H168 V394 H92 Z"/>
      <path d="M104 366 V394 M116 366 V394 M128 366 V394 M140 366 V394 M152 366 V394"/>
      <!-- fangs -->
      <path d="M104 394 L112 412 L120 394 M140 394 L148 412 L156 394"/>
      <!-- chin -->
      <path d="M130 412 V426 M122 426 h16"/>
    </g>

    <g id="geo"><use href="#mid"/><use href="#sideR"/><use href="#sideR" transform="matrix(-1,0,0,1,260,0)"/></g>

    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe08a"/><stop offset=".5" stop-color="#ff8a3d"/><stop offset="1" stop-color="#ff4d8d"/></linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5ef0ff"/><stop offset=".5" stop-color="#6a8bff"/><stop offset="1" stop-color="#b06bff"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1100" height="900" fill="#0a0c18"/>

  <!-- DAYTIME (light) -->
  <g>
    <rect x="20" y="20" width="1060" height="370" rx="20" fill="#f4ede0"/>
    <g transform="translate(70,38) scale(0.66)"><g stroke="#26201a" color="#26201a"><use href="#geo"/></g></g>
    <text x="330" y="190" font-family="Georgia,serif" font-size="58" fill="#1f1a14">Bienvenido</text>
    <text x="330" y="258" font-family="Georgia,serif" font-size="58" fill="#b23a3a">al Pueblo</text>
    <text x="332" y="312" font-family="monospace" font-size="17" fill="#6b5d49">Daytime / light theme &#183; solid ink, no glow</text>
  </g>

  <!-- NIGHT (dark) neon -->
  <g transform="translate(0,410)">
    <rect x="20" y="20" width="340" height="460" rx="20" fill="#0e1020" stroke="#23263a"/>
    <g transform="translate(58,32) scale(0.80)"><g stroke="url(#gA)" color="#ff8a4d" filter="url(#glow)"><use href="#geo"/></g></g>
    <text x="40" y="452" font-family="monospace" font-size="15" fill="#8a8fb0">night &#183; gold &#8594; magenta</text>
  </g>
  <g transform="translate(360,410)">
    <rect x="20" y="20" width="340" height="460" rx="20" fill="#0e1020" stroke="#23263a"/>
    <g transform="translate(58,32) scale(0.80)"><g stroke="url(#gB)" color="#7d93ff" filter="url(#glow)"><use href="#geo"/></g></g>
    <text x="40" y="452" font-family="monospace" font-size="15" fill="#8a8fb0">night &#183; cyan &#8594; violet</text>
  </g>
  <g transform="translate(720,410)">
    <rect x="20" y="20" width="340" height="460" rx="20" fill="#0e1020" stroke="#23263a"/>
    <g transform="translate(58,32) scale(0.80)"><g stroke="#ff5f8f" color="#ff5f8f" filter="url(#glow)"><use href="#geo"/></g></g>
    <text x="40" y="452" font-family="monospace" font-size="15" fill="#8a8fb0">night &#183; accent (hot-pink)</text>
  </g>
</svg>
</body></html>
